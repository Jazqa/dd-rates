<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no">
    <title>Dungeon Defenders Item Rates</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="sidebarOverlay"></div>
    <div id="sidebar">
        <div style="flex-grow: 1;">
            <label>Search</label>
            <div style="position: relative;"> <input type="text" id="sidebarSearch" autocomplete="off"
                    placeholder="Search by map or item">
                <div id="sidebarSearchResults"></div>
            </div>

            <label>Map</label>
            <select id="mapSelect"></select>

            <label>Difficulty</label>
            <select id="diffSelect"></select>

            <label>Item</label>
            <select id="itemSelect"></select>

            <select id="statSelect"></select>
        </div>


        <label>Y-Axis Scale</label>
        <select id="yAxisTypeSelect">
            <option value="linear">Linear</option>
            <option value="logarithmic">Logarithmic</option>
        </select>

        <label>Buckets</label>
        <select id="bucketTypeSelect">
            <option value="cumulative">Cumulative</option>
            <option value="unique">Unique</option>
        </select>

        <button class="sidebar-button" onclick="selectRandomItem()">Random Item</button>
    </div>

    <div id="content">
        <div id="header-container">
            <button id="headerButton" onclick="event.stopPropagation(); toggleSidebar();">☰</button>
            <h2 id="headerH2"></h2>
        </div>
        <div id="chartTabs" class="chart-tabs-container"></div>
        <div id="chartContainer" class="chart-container">
            <label id="chartLabel"></label>
            <canvas id="chart"></canvas>
        </div>

        <div id="ratesList" class="rates-container"></div>

        <div style="display: flex; width: 100%; justify-content: flex-end;">
            <small id="dataSmall" style="color: var(--fg2)"></small>
        </div>
    </div>

    <script src="js/dd.js"></script>
    <script src="js/averages.js"></script>
    <script src="js/rates.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/search.js"></script>

    <script>
        let gameVersion = "";
        let totalSeeds = 0;

        let currentChart = null;
        let manifestData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await initializeManifest();

            const params = new URLSearchParams(window.location.search);

            if (params.has('map')) {
                document.getElementById('mapSelect').value = params.get('map');
            } else {
                const maps = Object.keys(manifestData);
                mapSelect.value = maps[Math.floor(Math.random() * maps.length)];
            }

            updateDifficulties();

            if (params.has('diff')) {
                document.getElementById('diffSelect').value = params.get('diff');
            }

            updateItems();

            if (params.has('item')) {
                document.getElementById('itemSelect').value = params.get('item');
            } else {
                const items = manifestData[mapSelect.value][diffSelect.value];
                itemSelect.value = items[Math.floor(Math.random() * items.length)];
            }

            if (params.has('stat')) {
                document.getElementById('statSelect').value = params.get('stat');
            }

            document.getElementById('yAxisTypeSelect').onchange = () => {
                loadData(false);
            };

            document.getElementById('bucketTypeSelect').onchange = () => {
                loadData(false);
            };

            loadData(true);
        });


        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        document.addEventListener('click', (event) => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('open') && window.innerWidth <= 768) {
                if (event.target === overlay) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                }
            }
        });

        async function initializeManifest() {
            try {
                const response = await fetch('./data/manifest.json');
                manifestData = await response.json();

                const mapSelect = document.getElementById('mapSelect');
                Object.keys(manifestData).forEach(mapName => {
                    let opt = document.createElement('option');
                    opt.value = mapName;
                    opt.textContent = mapName;
                    mapSelect.appendChild(opt);
                });

                mapSelect.onchange = () => {
                    updateDifficulties();
                    updateItems();
                    loadData(true);
                    updateURL();
                };

                document.getElementById('diffSelect').onchange = () => {
                    const itemSelect = document.getElementById('itemSelect');
                    const selectedItem = itemSelect.value;

                    updateItems();

                    if (selectedItem) {
                        itemSelect.value = selectedItem;
                    }

                    loadData(true);
                    updateURL();
                };

                document.getElementById('itemSelect').onchange = () => {
                    loadData(true);
                    updateURL();
                };

                document.getElementById('statSelect').onchange = () => {
                    loadData(false);
                    updateURL();
                };

                setupSidebarSearch();
            } catch (err) {
                console.error("Error: Failed to load manifest:", err);
            }
        }

        function selectRandomItem() {
            const maps = Object.keys(manifestData);
            if (maps.length === 0) return;

            const randomMap = maps[Math.floor(Math.random() * maps.length)];

            const diffs = Object.keys(manifestData[randomMap]);
            const randomDiff = diffs[Math.floor(Math.random() * diffs.length)];

            const items = manifestData[randomMap][randomDiff];
            const randomItem = items[Math.floor(Math.random() * items.length)];

            applySelection(randomMap, randomDiff, randomItem);
        }

        function updateURL() {
            const params = new URLSearchParams({
                map: document.getElementById('mapSelect').value,
                diff: document.getElementById('diffSelect').value,
                item: document.getElementById('itemSelect').value,
                stat: document.getElementById('statSelect').value
            });
            const newRelativePathQuery = window.location.pathname + '?' + params.toString();
            history.replaceState(null, '', newRelativePathQuery);
        }

        function updateDifficulties() {
            const map = document.getElementById('mapSelect').value;
            const diffSelect = document.getElementById('diffSelect');
            diffSelect.innerHTML = '';

            if (manifestData[map]) {
                Object.keys(manifestData[map]).forEach(diff => {
                    let opt = document.createElement('option');
                    opt.value = diff;
                    opt.textContent = diff;
                    diffSelect.appendChild(opt);
                });
            }
        }

        function updateItems() {
            const map = document.getElementById('mapSelect').value;
            const diff = document.getElementById('diffSelect').value;
            const itemSelect = document.getElementById('itemSelect');
            itemSelect.innerHTML = '';

            const items = manifestData[map]?.[diff];

            if (items) {
                items.forEach(itemName => {
                    let opt = document.createElement('option');
                    opt.value = itemName;
                    opt.textContent = itemName;
                    itemSelect.appendChild(opt);
                });
            }
        }

        async function loadData(shouldRebuild = false) {
            const chartTabs = document.getElementById('chartTabs');
            const statSelect = document.getElementById('statSelect');

            const map = document.getElementById('mapSelect').value;
            const diff = document.getElementById('diffSelect').value;
            const item = document.getElementById('itemSelect').value;
            const bucketType = document.getElementById('bucketTypeSelect').value;

            let stat = statSelect.value;

            try {
                const url = `./data/${map}/${diff}/${item}.json`;
                const response = await fetch(url);
                const json = await response.json();

                if (json.rates.tower_caps) {
                    json.rates.tower_caps_individual = {};
                }

                gameVersion = json.game_version;
                totalSeeds = json.total_seeds

                if (shouldRebuild) {
                    const rates = Object.keys(json.rates);
                    statSelect.innerHTML = '';
                    chartTabs.innerHTML = '';

                    rates.forEach(key => {
                        let opt = document.createElement('option');
                        opt.value = key;
                        opt.textContent = getTabName(key, json.rates);
                        statSelect.appendChild(opt);
                    });

                    const allGroupedKeys = Object.values(STAT_GROUPS).flat();

                    rates.forEach(key => {
                        if (!allGroupedKeys.includes(key)) {
                            renderTabButton(key, getTabName(key, json.rates), chartTabs);
                        }
                    });

                    Object.entries(STAT_GROUPS).forEach(([groupName, members]) => {
                        const available = members.filter(m => rates.includes(m));

                        if (available.length === 1) {
                            const singleKey = available[0];
                            renderTabButton(singleKey, groupName === "Damage" ? groupName : getTabName(singleKey, json.rates), chartTabs);
                        } else if (available.length > 1) {
                            renderMetaTab(groupName, available, json.rates);
                        }
                    });

                    const urlStat = new URLSearchParams(window.location.search).get('stat');
                    statSelect.value = (urlStat && rates.includes(urlStat)) ? urlStat : rates[0];
                }

                let stat = statSelect.value;
                if (!stat) return;

                const headerH2Element = document.getElementById('headerH2');
                const chartLabelElement = document.getElementById('chartLabel');
                const dataSmallElement = document.getElementById("dataSmall");

                headerH2Element.textContent = `${item}`;
                chartLabelElement.textContent = "";
                dataSmallElement.textContent = `Sample Size: ${totalSeeds.toLocaleString("fr-FR")}, Game Version ${gameVersion}`;

                let data = json.rates[stat]
                let buckets, binSize, binnedData, labels;
                switch (stat) {
                    case "quality":
                        data = orderQualityArray(data);
                        renderChart(RARITY_LABELS_SHORT, data);
                        updateRatesList(RARITY_LABELS, data);
                        break;

                    case "level":
                        buckets = Object.keys(data.buckets);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 20));
                        renderChart(binnedData.labels, binnedData.values);
                        binnedData = getBinnedData(data.buckets, 10, false);
                        updateRatesList(binnedData.labels, binnedData.values);
                        updateCustomRate(data.buckets)
                        break;

                    case "cat":
                        buckets = Object.keys(data.buckets);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 10));
                        renderChart(binnedData.labels, binnedData.values);
                        binnedData = getBinnedData(data.buckets, 5, false);
                        updateRatesList(binnedData.labels, binnedData.values);
                        break;

                    case "damage":
                    case "damage_2":
                        chartLabelElement.textContent = "After upgrading " + getReadableUpgrades(data.info);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 20));
                        renderChart(binnedData.labels, binnedData.values);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 50), false);
                        updateRatesList(binnedData.labels, binnedData.values);
                        updateCustomRate(data.buckets)
                        break;

                    case "tower_totals":
                    case "app_totals":
                    case "hermit_totals":
                    case "guardian_totals":
                        chartLabelElement.textContent = getReadableTotals(stat);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 20));
                        renderChart(binnedData.labels, binnedData.values);
                        binnedData = getBinnedData(data.buckets, data.step, false);
                        updateRatesList(binnedData.labels, binnedData.values);
                        updateCustomRate(data.buckets)
                        break;

                    case "hdmgab1":
                    case "hdmgab2":
                    case "hdmgboth":
                    case "hdmg":
                    case "ab1":
                    case "ab2":
                    case "thp":
                    case "trate":
                    case "tdmg":
                    case "trange":
                        chartLabelElement.textContent = getReadableTotals(stat) || STAT_LABELS[stat];
                        buckets = Object.keys(data.buckets);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 20));
                        renderChart(binnedData.labels, binnedData.values);
                        binnedData = getBinnedData(data.buckets, 5, false);
                        updateRatesList(binnedData.labels, binnedData.values);
                        updateCustomRate(data.buckets)
                        break;

                    case "tower_caps":
                        chartLabelElement.textContent = "# of simultaneous tower caps";

                        const capLabels = ["Single", "Double", "Triple", "Quad"];
                        const capBuckets = ["101", "102", "103", "104"];
                        let capValues = capBuckets.map(b => data.buckets[b] || 0);

                        if (bucketType === "cumulative") {
                            for (let i = capValues.length - 2; i >= 0; i--) {
                                capValues[i] += capValues[i + 1];
                            }
                        }

                        renderChart(capLabels, capValues, "bar");
                        updateRatesList(capLabels, capValues);
                        break;

                    case "tower_caps_individual": {
                        const sourceData = json.rates.tower_caps;
                        if (!sourceData) break;

                        const isCumulative = (bucketType === "cumulative");

                        const individuals = Object.keys(CAP_COMBOS)
                            .map(Number)
                            .filter(key => key >= 1 && key <= 15)
                            .map(currentComboKey => {
                                let totalValue = 0;

                                if (isCumulative) {
                                    Object.entries(sourceData.buckets).forEach(([bucketKey, count]) => {
                                        const bKey = Number(bucketKey);
                                        if (bKey >= 1 && bKey <= 15 && (bKey & currentComboKey) === currentComboKey) {
                                            totalValue += count;
                                        }
                                    });
                                } else {
                                    totalValue = sourceData.buckets[currentComboKey] || 0;
                                }

                                return {
                                    label: CAP_COMBOS[currentComboKey] || `Combo ${currentComboKey}`,
                                    value: totalValue
                                };
                            })
                            .filter(i => i.value > 0)
                            .sort((a, b) => b.value - a.value);

                        const labels = individuals.map(i => i.label);
                        const values = individuals.map(i => i.value);

                        renderChart(labels, values, "bar");
                        updateRatesList(labels, values);
                        break;
                    }
                    case "support_caps":
                        chartLabelElement.textContent = "After upgrading " + getReadableUpgrades(data.info);

                        labels = ["Cast Rate", "Ability 1", "Ability 2"]
                        buckets = ["4", "5", "6"];
                        data = buckets.map(b => data.buckets[b] || 0);

                        renderChart(labels, data, "bar");
                        updateRatesList(labels, data);
                        break;

                    case "scale":
                        chartLabelElement.textContent = "Size at max level"
                        buckets = Object.keys(data.buckets);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 20));
                        renderChart(binnedData.labels, binnedData.values);
                        binnedData = getBinnedData(data.buckets, getDynamicBinSize(data.buckets, 50), false);
                        updateRatesList(binnedData.labels, binnedData.values);
                        updateCustomRate(data.buckets)
                        break;

                    case "multiproj":
                        data = orderQualityArray(data);
                        renderChart(RARITY_LABELS_SHORT, data);
                        updateRatesList(RARITY_LABELS, data);
                        break;

                    default:
                        break;
                }

                updateActiveTabStyles(stat);
            } catch (_) { }
        }

        function renderTabButton(key, label, container) {
            const btn = document.createElement('button');
            btn.className = 'chart-tab-button';
            btn.textContent = label;
            btn.dataset.stat = key;

            btn.onclick = () => {
                document.getElementById('statSelect').value = key;
                loadData(false);
                updateURL();
            };
            container.appendChild(btn);
        }

        function renderMetaTab(groupName, members, ratesData) {
            const wrap = document.createElement('div');
            wrap.className = 'chart-tab-dropdown';
            wrap.dataset.group = groupName;

            const mainBtn = document.createElement('button');
            mainBtn.className = 'chart-tab-button';
            mainBtn.textContent = `${groupName} ▾`;
            wrap.appendChild(mainBtn);

            const content = document.createElement('div');
            content.className = 'chart-tab-dropdown-content';

            members.forEach(key => {
                const b = document.createElement('button');
                b.textContent = getTabName(key, ratesData);
                b.dataset.stat = key;

                b.onclick = () => {
                    document.getElementById('statSelect').value = key;
                    loadData(false);
                    updateURL();
                };
                content.appendChild(b);
            });

            wrap.appendChild(content);
            document.getElementById('chartTabs').appendChild(wrap);
        }

        function updateActiveTabStyles(currentStat) {
            document.querySelectorAll('.chart-tab-button, .chart-tab-dropdown-content button').forEach(el => {
                el.classList.remove('active');
            });

            const activeBtn = document.querySelector(`[data-stat="${currentStat}"]`);

            if (activeBtn) {
                activeBtn.classList.add('active');

                const parentDropdown = activeBtn.closest('.chart-tab-dropdown');
                if (parentDropdown) {
                    parentDropdown.querySelector('.chart-tab-button').classList.add('active');
                }
            }
        }

        function getBinnedData(buckets, size, forChart = true) {
            const mode = document.getElementById('bucketTypeSelect').value;
            const isScale = document.getElementById('statSelect').value === 'scale';

            const binned = {};

            Object.entries(buckets).forEach(([key, value]) => {
                const numKey = Number(key);
                if (numKey < 0) return;
                const bin = Math.floor(numKey / size) * size;
                binned[bin] = (binned[bin] || 0) + value;
            });

            const sortedKeys = Object.keys(binned).map(Number).sort((a, b) => a - b);
            const finalValues = [];
            const finalLabels = [];

            if (mode === 'cumulative') {
                let runningTotal = 0;
                for (let i = sortedKeys.length - 1; i >= 0; i--) {
                    runningTotal += binned[sortedKeys[i]];
                    finalValues[i] = runningTotal;
                    const val = isScale ? (sortedKeys[i] / 10).toFixed(1) : sortedKeys[i].toLocaleString("fr-FR");
                    finalLabels[i] = `${val}+`;
                }
            } else {
                sortedKeys.forEach((key, i) => {
                    finalValues.push(binned[key]);
                    const nextBin = sortedKeys[i + 1];
                    if (isScale) {
                        const start = (key / 10).toFixed(1);
                        if (nextBin) {
                            const end = (nextBin / 10).toFixed(1);
                            finalLabels.push(`${start} - ${end}`);
                        } else {
                            finalLabels.push(`${start}+`);
                        }
                    } else {
                        const startStr = key.toLocaleString("fr-FR");
                        if (nextBin) {
                            const endStr = (nextBin - 1).toLocaleString("fr-FR");
                            finalLabels.push(`${startStr} - ${endStr}`);
                        } else {
                            finalLabels.push(`${startStr}+`);
                        }
                    }
                });
            }

            return {
                rawKeys: sortedKeys,
                labels: finalLabels,
                values: finalValues
            };
        }

        function getDynamicBinSize(buckets, targetBins = 20) {
            const keys = Object.keys(buckets).map(Number);
            const min = Math.min(...keys);
            const max = Math.max(...keys);
            const range = max - min;

            if (range === 0) return 1;

            let rawSize = range / targetBins;
            const magnitude = Math.pow(10, Math.floor(Math.log10(rawSize)));
            const res = rawSize / magnitude;

            if (res < 1.5) return 1 * magnitude;
            if (res < 3) return 2 * magnitude;
            if (res < 7) return 5 * magnitude;
            return 10 * magnitude;
        }

        function applySelection(map, diff, item) {
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }

            const mapSelect = document.getElementById('mapSelect');
            const diffSelect = document.getElementById('diffSelect');
            const itemSelect = document.getElementById('itemSelect');

            mapSelect.value = map;
            updateDifficulties();
            diffSelect.value = diff;
            updateItems();
            itemSelect.value = item;

            loadData(true);
            updateURL();
        }
    </script>

</body>

</html>
