<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dungeon Defenders Item Rates</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #0091ff;
            --accent2: #0060c0;
            --bg: #121212;
            --bg2: #1e1e1e;
            --border: #444;
            --fg: white;
            --fg2: #aaa;
            --hov: #ffffff11;
        }


        h2 {
            margin-top: 0;
            color: var(--fg);
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            height: 100vh;
            margin: 0;
        }

        #sidebar {
            width: 225px;
            background: var(--bg2);
            padding: 20px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        #globalSearch,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        #globalSearch:focus,
        select:focus {}

        #searchResults {}

        #searchResults:not(:empty) {
            margin-top: -20px;
            margin-bottom: 10px;
            border-top: none;
            background-color: var(--bg);
            border: 1px solid var(--border);
        }

        #searchResults div small {
            cursor: pointer;
            color: var(--fg2);
        }

        #searchResults div:last-child {
            border-bottom: none !important;
        }

        #searchResults div:hover {
            background-color: #0060c0;
        }

        #content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .chart-container {
            flex-grow: 1;
            background-color: var(--bg2);
            border: 1px solid var(--border);
            padding: 10px;
        }

        .chart-container label {
            display: block;
            margin-top: 10px;
            color: var(--fg2);
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .rates-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            margin-top: 21px;
            margin-left: 1px;
        }

        .rate-item {
            display: flex;
            flex-direction: column;
            background-color: var(--bg2);
            padding: 10px;
            margin-top: -1px;
            margin-left: -1px;
            border: 1px solid var(--border);
        }

        .rate-item.highlight,
        .rate-item:hover {
            background-color: var(--hov);
        }




        .rate-label {
            color: var(--fg2);
            text-transform: uppercase;
        }

        .rate-value {
            color: var(--accent);
            font-family: monospace;
        }

        .tab-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--fg2);
            margin-bottom: 10px;

        }

        .tab-btn.active {
            color: var(--accent);
            text-decoration: none;
        }

        #statSelect {
            display: none;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div style="flex-grow: 1;">
            <label>Search</label>
            <div style="position: relative;"> <input type="text" id="globalSearch" autocomplete="off"
                    placeholder="Type to search...">
                <div id="searchResults"></div>
            </div>

            <label>Map</label>
            <select id="mapSelect"></select>

            <label>Difficulty</label>
            <select id="diffSelect"></select>

            <label>Item</label>
            <select id="itemSelect"></select>

            <select id="statSelect"></select>
        </div>


        <label>Y-Axis Scale</label>
        <select id="yAxisType">
            <option value="linear">Linear</option>
            <option value="logarithmic">Logarithmic</option>
        </select>

        <label>Buckets</label>
        <select id="bucketType">
            <option value="cumulative">Cumulative</option>
            <option value="unique">Unique</option>
        </select>
    </div>

    <div id="content">
        <h2 id="itemTitle"></h2>
        <div class="chart-container">
            <div id="statTabs" class="tabs-container"></div>
            <label></label>
            <canvas id="chart"></canvas>
        </div>
        <div id="ratesList" class="rates-container"></div>
    </div>

    <script>
        Chart.defaults.font.family = "monospace";
        Chart.defaults.color = '#888';

        const TOTAL_SEEDS = 2147483647;

        const STAT_LABELS = {
            "quality": "Quality",
            "level": "Level",
            "damage": "Damage",
            "damage_2": "Ranged Damage",
            "tower_caps": "Tower Caps",
            "tower_totals": "Tower Totals",
            "app_totals": "Apprentice Totals",
            "hermit_totals": "Hermit Totals",
            "guardian_totals": "Guardian Totals",
            "support_caps": "Support Caps",
            "scale": "Size",
            "multiproj": "Multiple Projectiles"
        };

        const RARITY_LABELS = ["Cursed", "Torn", "Worn", "Stocky", "Solid", "Sturdy", "Polished", "Shining", "Powerful", "Amazing", "Epic", "Legendary", "Godly", "Mythical", "Transcendent", "Supreme", "Ultimate", "Ultimate 93", "Ultimate +", "Ultimate ++"];
        const RARITY_LABELS_SHORT = ["CRSD", "TORN", "WORN", "STKY", "SLD", "STRDY", "PLSH", "SHNY", "PWR", "AMZ", "EPIC", "LEG", "GODLY", "MYTH", "TRANS", "SUP", "ULT", "U93", "ULT+", "ULT++"];

        let currentChart = null;
        let manifestData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await initializeManifest();

            document.getElementById('yAxisType').onchange = () => {
                loadData(false);
            };

            document.getElementById('bucketType').onchange = () => {
                loadData(false);
            };

            const params = new URLSearchParams(window.location.search);

            if (params.has('map')) {
                const map = params.get('map');
                const diff = params.get('diff');
                const item = params.get('item');
                const stat = params.get('stat');

                document.getElementById('mapSelect').value = map;
                updateDifficulties();
                document.getElementById('diffSelect').value = diff;
                updateItems();
                document.getElementById('itemSelect').value = item;

                if (stat) document.getElementById('statSelect').value = stat;
                loadData(true);
            }
        });

        async function initializeManifest() {
            try {
                const response = await fetch('./data/manifest.json');
                manifestData = await response.json();

                const mapSelect = document.getElementById('mapSelect');
                Object.keys(manifestData).forEach(mapName => {
                    let opt = document.createElement('option');
                    opt.value = mapName;
                    opt.textContent = mapName;
                    mapSelect.appendChild(opt);
                });

                mapSelect.onchange = () => {
                    updateDifficulties();
                    updateItems();
                    loadData(true);
                    updateURL();
                };

                document.getElementById('diffSelect').onchange = () => {
                    updateItems();
                    loadData(true);
                    updateURL();
                };

                document.getElementById('itemSelect').onchange = () => {
                    loadData(true);
                    updateURL();
                };

                document.getElementById('statSelect').onchange = () => {
                    loadData(false);
                    updateURL();
                };

                setupGlobalSearch();

                updateDifficulties();
                updateItems();
                loadData(true);
            } catch (err) {
                console.error("Error: Failed to load manifest:", err);
            }
        }

        function updateURL() {
            const params = new URLSearchParams({
                map: document.getElementById('mapSelect').value,
                diff: document.getElementById('diffSelect').value,
                item: document.getElementById('itemSelect').value,
                stat: document.getElementById('statSelect').value
            });
            const newRelativePathQuery = window.location.pathname + '?' + params.toString();
            history.replaceState(null, '', newRelativePathQuery);
        }

        function setSelectorsFromURL() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('map')) document.getElementById('mapSelect').value = params.get('map');

            if (params.has('diff')) {
                updateDifficulties();
                document.getElementById('diffSelect').value = params.get('diff');
            }
            if (params.has('item')) {
                updateItems();
                document.getElementById('itemSelect').value = params.get('item');
            }
            if (params.has('stat')) {
                document.getElementById('statSelect').value = params.get('stat');
            }
        }

        function updateDifficulties() {
            const map = document.getElementById('mapSelect').value;
            const diffSelect = document.getElementById('diffSelect');
            diffSelect.innerHTML = '';

            if (manifestData[map]) {
                Object.keys(manifestData[map]).forEach(diff => {
                    let opt = document.createElement('option');
                    opt.value = diff;
                    opt.textContent = diff;
                    diffSelect.appendChild(opt);
                });
            }
        }

        function updateItems() {
            const map = document.getElementById('mapSelect').value;
            const diff = document.getElementById('diffSelect').value;
            const itemSelect = document.getElementById('itemSelect');
            itemSelect.innerHTML = '';

            const items = manifestData[map]?.[diff];

            if (items) {
                items.forEach(itemName => {
                    let opt = document.createElement('option');
                    opt.value = itemName;
                    opt.textContent = itemName;
                    itemSelect.appendChild(opt);
                });
            }
        }

        async function loadData(rebuildStats = false) {
            const map = document.getElementById('mapSelect').value;
            const diff = document.getElementById('diffSelect').value;
            const item = document.getElementById('itemSelect').value;
            const statSelect = document.getElementById('statSelect');
            const bucketType = document.getElementById('bucketType').value;


            if (!item) return;

            try {
                const url = `./data/${map}/${diff}/${item}.json`;
                const response = await fetch(url);
                const json = await response.json();

                if (rebuildStats) {
                    const availableStats = Object.keys(json.rates);
                    const currentVal = statSelect.value;
                    const tabContainer = document.getElementById('statTabs');

                    statSelect.innerHTML = '';
                    tabContainer.innerHTML = '';

                    availableStats.forEach(key => {
                        let opt = document.createElement('option');
                        opt.value = key;
                        let label = STAT_LABELS[key] || key;
                        opt.textContent = label;
                        statSelect.appendChild(opt);

                        const btn = document.createElement('button');
                        btn.className = 'tab-btn';
                        btn.textContent = label;
                        btn.dataset.key = key;

                        btn.onclick = () => {
                            statSelect.value = key;
                            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            loadData(false);
                            updateURL();
                        };
                        tabContainer.appendChild(btn);
                    });

                    const activeKey = availableStats.includes(currentVal) ? currentVal : availableStats[0];
                    statSelect.value = activeKey;

                    const activeTab = Array.from(tabContainer.children).find(t => t.dataset.key === activeKey);
                    if (activeTab) activeTab.classList.add('active');
                }

                const statKey = statSelect.value;
                const titleElement = document.getElementById('itemTitle');
                const labelElement = document.querySelector('.chart-container label');

                titleElement.textContent = `${item}`;
                let labels, data, binSize, buckets, bucketCount, result, highest;
                switch (statKey) {
                    case "quality":
                        labelElement.textContent = "";
                        data = [...json.rates.quality.slice(0, 13).reverse(), ...json.rates.quality.slice(13)];
                        renderChart(RARITY_LABELS_SHORT, data);
                        updateRatesList(RARITY_LABELS, data);
                        break;
                    case "level":
                        labelElement.textContent = "";
                        binSize = 10;
                        result = getBinnedData(json.rates.level.buckets, binSize);
                        renderChart(result.labels, result.values);
                        updateRatesList(result.labels, result.values);
                        break;
                    case "damage":
                    case "damage_2":
                        labelElement.textContent = "Upgrades: " + json.rates[statKey].info;
                        buckets = Object.keys(json.rates[statKey].buckets)
                        bucketCount = buckets.length;
                        highest = buckets[bucketCount - 1]
                        binSize = highest > 200000 ? 5000 : highest > 100000 ? 2000 : 1000;
                        result = getBinnedData(json.rates[statKey].buckets, binSize);
                        renderChart(result.labels, result.values);
                        updateRatesList(result.labels, result.values);
                        break;
                    case "tower_totals":
                    case "app_totals":
                    case "hermit_totals":
                    case "guardian_totals":
                        labelElement.textContent = "";
                        binSize = 50;
                        result = getBinnedData(json.rates[statKey].buckets, binSize);
                        renderChart(result.labels, result.values);
                        updateRatesList(result.labels, result.values);
                        break;
                    case "tower_caps":
                        labelElement.textContent = "";
                        labels = ["Single", "Double", "Triple", "Quad"];
                        data = [json.rates[statKey].buckets["101"] || 0, json.rates[statKey].buckets["102"] || 0, json.rates[statKey].buckets["103"] || 0, json.rates[statKey].buckets["104"] || 0];

                        if (bucketType === "cumulative") {
                            for (let i = data.length - 2; i >= 0; i--) {
                                data[i] += data[i + 1];
                            }
                        }

                        renderChart(labels, data, "bar");
                        updateRatesList(labels, data);
                        break;
                    case "support_caps":
                        labelElement.textContent = "Upgrades: " + json.rates.support_caps.info;
                        labels = ["Cast Rate", "Ability 1", "Ability 2"]
                        data = [json.rates[statKey].buckets["4"], json.rates[statKey].buckets["5"], json.rates[statKey].buckets["6"]];
                        renderChart(labels, data, "bar");
                        updateRatesList(labels, data);
                        break;
                    case "scale":
                        labelElement.textContent = "";
                        bucketCount = Object.keys(json.rates.scale.buckets).length;
                        binSize = bucketCount > 20 ? 5 : 1;
                        result = getBinnedData(json.rates.scale.buckets, binSize);
                        renderChart(result.labels, result.values);
                        updateRatesList(result.labels, result.values);
                        break;
                    case "multiproj":
                        labelElement.textContent = "";
                        data = [...json.rates.multiproj.slice(0, 13).reverse(), ...json.rates.multiproj.slice(13)];
                        renderChart(RARITY_LABELS_SHORT, data);
                        updateRatesList(RARITY_LABELS, data);
                        break;
                    default:
                        break;
                }
            } catch (err) {
                console.error("Error: Failed to load item data:", err);
            }
        }

        function getBinnedData(buckets, size) {
            const binned = {};
            const mode = document.getElementById('bucketType').value;
            const isScale = document.getElementById('statSelect').value === 'scale';

            // 1. Group data into bins
            Object.entries(buckets).forEach(([key, value]) => {
                const numKey = Number(key);
                if (numKey < 0) return;
                const bin = Math.floor(numKey / size) * size;
                binned[bin] = (binned[bin] || 0) + value;
            });

            const sortedKeys = Object.keys(binned).map(Number).sort((a, b) => a - b);
            const finalValues = [];
            const finalLabels = [];

            if (mode === 'cumulative') {
                let runningTotal = 0;
                for (let i = sortedKeys.length - 1; i >= 0; i--) {
                    runningTotal += binned[sortedKeys[i]];
                    finalValues[i] = runningTotal;
                    const val = isScale ? (sortedKeys[i] / 10).toFixed(1) : sortedKeys[i].toLocaleString("fr-FR");
                    finalLabels[i] = `${val}+`;
                }
            } else {
                sortedKeys.forEach((key, i) => {
                    finalValues.push(binned[key]);
                    const nextBin = sortedKeys[i + 1];

                    if (isScale) {
                        const start = (key / 10).toFixed(1);
                        if (nextBin) {
                            const end = (nextBin / 10).toFixed(1);
                            finalLabels.push(`${start} - ${end}`);
                        } else {
                            finalLabels.push(`${start}+`);
                        }
                    } else {
                        const startStr = key.toLocaleString("fr-FR");
                        if (nextBin) {
                            const endStr = (nextBin - 1).toLocaleString("fr-FR");
                            finalLabels.push(`${startStr} - ${endStr}`);
                        } else {
                            finalLabels.push(`${startStr}+`);
                        }
                    }
                });
            }

            return {
                rawKeys: sortedKeys,
                labels: finalLabels,
                values: finalValues
            };
        }

        function renderChart(labels, data, chartType = "line") {
            const ctx = document.getElementById('chart').getContext('2d');
            const yAxisType = document.getElementById('yAxisType').value;

            if (currentChart) currentChart.destroy();

            currentChart = new Chart(ctx, {
                type: chartType,
                data: {
                    labels,
                    datasets: [{
                        data,
                        borderWidth: 2,
                        borderColor: '#0091ff',
                        backgroundColor: '#0091ff22',
                        pointBackgroundColor: '#0060c0',
                        fill: true,
                        pointRadius: 4,
                        pointHoverRadius: 8,
                        pointHoverBorderWidth: 4,
                        pointBorderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: yAxisType,
                            grid: { color: 'transparent' },
                            ticks: { callback: () => "" }
                        },
                        x: {
                            grid: {
                                color: '#333',
                            },
                            ticks: {
                                autoSkip: true,
                                maxTicksLimit: 20,
                                callback: function (value, index, values) {
                                    const label = this.getLabelForValue(value);
                                    return label;
                                }
                            }
                        }
                    },
                    onHover: (event, activeElements) => {
                        document.querySelectorAll('.rate-item').forEach(el => el.classList.remove('highlight'));

                        if (activeElements.length > 0) {
                            const index = activeElements[0].index;
                            const items = document.querySelectorAll('.rate-item');

                            const labelText = currentChart.data.labels[index];
                            const target = Array.from(items).find(item =>
                                item.querySelector('label').textContent === labelText
                            );

                            if (target) {
                                target.classList.add('highlight');
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#121212',
                            titleColor: '#aaa',
                            bodyColor: '#0091ff',
                            borderColor: '#444',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false,
                            cornerRadius: 0,
                            titleColor: '#fff',
                            titleFont: {
                                family: 'sans-serif',
                            },
                            callbacks: {
                                label: (context) => {
                                    const rate = context.raw;

                                    let formatted
                                    if (!rate) {
                                        formatted = "∞";
                                    } else {
                                        let chance = (TOTAL_SEEDS / rate);
                                        formatted = chance < 10 ? chance.toFixed(2) : Math.round(chance).toLocaleString("fr-FR");
                                    }

                                    return `1 / ${formatted}`;
                                }
                            }
                        }
                    },
                }
            });

            const canvas = document.getElementById('chart');

            canvas.onmouseleave = () => {
                document.querySelectorAll('.rate-item').forEach(el => el.classList.remove('highlight'));
            };
        }

        function updateRatesList(labels, data) {
            const listDiv = document.getElementById('ratesList');
            if (!listDiv) return;

            listDiv.innerHTML = '';
            const statKey = document.getElementById('statSelect').value;

            labels.forEach((label, index) => {
                const rate = data[index];

                if (!rate || rate <= 0 || isNaN(rate)) return;

                const chance = (TOTAL_SEEDS / rate);

                if (statKey === "damage" || statKey === "damage_2" || statKey === "level" || statKey.includes("totals")) {
                    if (chance < 30) return;
                }


                if (statKey === "tower_caps" && index === 0) {
                    if (chance === 1.0) return;
                }

                let formattedChance = chance < 10 ?
                    chance.toFixed(2) :
                    Math.round(chance).toLocaleString("fr-FR");

                const row = document.createElement('div');
                row.className = 'rate-item';
                row.dataset.index = index;

                row.onmouseenter = () => {
                    if (!currentChart) return;

                    const meta = currentChart.getDatasetMeta(0);
                    const point = meta.data[index];

                    if (point) {
                        currentChart.setActiveElements([{ datasetIndex: 0, index: index }]);
                        currentChart.tooltip.setActiveElements([{ datasetIndex: 0, index: index }], {
                            x: point.x,
                            y: point.y,
                        });
                        currentChart.update();
                    }
                };

                row.onmouseleave = () => {
                    if (!currentChart) return;
                    currentChart.setActiveElements([]);
                    currentChart.tooltip.setActiveElements([], { x: 0, y: 0 });
                    currentChart.update();
                };

                row.innerHTML = `
                    <label>${label}</label>
                    <span class="rate-value">1 / ${formattedChance}</span>
                `;

                listDiv.appendChild(row);
            });
            listDiv.style.display = listDiv.childElementCount > 0 ? 'grid' : 'none';
        }


        function setupGlobalSearch() {
            const input = document.getElementById('globalSearch');
            const resultsDiv = document.getElementById('searchResults');

            input.addEventListener('input', () => {
                const query = input.value.toLowerCase();
                resultsDiv.innerHTML = '';
                if (query.length < 2) return;

                let matches = [];

                for (const [map, diffs] of Object.entries(manifestData)) {
                    for (const [diff, items] of Object.entries(diffs)) {
                        items.forEach(item => {
                            if (item.toLowerCase().includes(query) || map.toLowerCase().includes(query)) {
                                matches.push({ map, diff, item });
                            }
                        });
                    }
                }

                matches.slice(0, 10).forEach(match => {
                    const div = document.createElement('div');
                    div.style.padding = '10px';
                    div.style.borderBottom = '1px solid #333';
                    div.innerHTML = `<label>${match.item}</label><small>${match.map}</small>`;
                    div.onclick = () => {
                        applySelection(match.map, match.diff, match.item);
                        resultsDiv.innerHTML = '';
                        input.value = '';
                    };
                    resultsDiv.appendChild(div);
                });


            });
        }

        function applySelection(map, diff, item) {
            const mapSelect = document.getElementById('mapSelect');
            mapSelect.value = map;

            updateDifficulties();
            const diffSelect = document.getElementById('diffSelect');
            diffSelect.value = diff;

            updateItems();
            const itemSelect = document.getElementById('itemSelect');
            itemSelect.value = item;

            loadData(true);
            updateURL();
        }
    </script>

</body>

</html>
